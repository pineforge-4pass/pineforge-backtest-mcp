name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Belt-and-suspenders: when triggered by a tag push, refuse to publish
      # if the tag (e.g. v0.3.0) doesn't match the committed VERSION file.
      # Skipped for workflow_dispatch — there's no tag to compare against.
      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag_version="${TAG_NAME#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          echo "tag       : $tag_version"
          echo "VERSION   : $file_version"
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::Tag '$TAG_NAME' does not match VERSION file '$file_version'. Bump VERSION (and re-run sync-version) before tagging."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # npm Trusted Publishing (OIDC) needs npm >= 11.5.0 — newer than the npm
      # bundled with Node 22. No NPM_TOKEN: the id-token below authenticates to
      # npm via the configured trusted publisher, and provenance is automatic.
      # Pinned (not @latest) for a reproducible, reviewed publish toolchain.
      - run: npm install -g npm@11.5.0
      - run: npm install --no-package-lock
      - run: npm run build
      - run: npm publish --access=public

  # Publish a GitHub Release for the tag. Glama's "stable releases" check reads
  # the Releases API (not git tags), so a bare tag isn't enough. Runs only on a
  # tag push, after npm publish succeeds.
  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes

  # Build + push the self-contained MCP image so users can `docker pull` it
  # (Glama also builds from docker/Dockerfile directly). Tag pushes only.
  image:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/pineforge-4pass/pineforge-codegen-mcp:${{ github.ref_name }}
            ghcr.io/pineforge-4pass/pineforge-codegen-mcp:latest
