name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Belt-and-suspenders: when triggered by a tag push, refuse to publish
      # if the tag (e.g. v0.3.0) doesn't match the committed VERSION file.
      # Skipped for workflow_dispatch — there's no tag to compare against.
      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag_version="${TAG_NAME#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          echo "tag       : $tag_version"
          echo "VERSION   : $file_version"
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::Tag '$TAG_NAME' does not match VERSION file '$file_version'. Bump VERSION (and re-run sync-version) before tagging."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # npm Trusted Publishing (OIDC) needs npm >= 11.5.0 — newer than the npm
      # bundled with Node 22. No NPM_TOKEN: the id-token below authenticates to
      # npm via the configured trusted publisher, and provenance is automatic.
      # Pinned (not @latest) for a reproducible, reviewed publish toolchain.
      - run: npm install -g npm@11.5.0
      - run: npm install --no-package-lock
      - run: npm run build
      - run: npm publish --access=public

  # Publish a GitHub Release for the tag. Glama's "stable releases" check reads
  # the Releases API (not git tags), so a bare tag isn't enough. Runs only on a
  # tag push, after npm publish succeeds.
  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes

  # Build + push the self-contained MCP image so users can `docker pull` it
  # (Glama also builds from docker/Dockerfile directly). Tag pushes only.
  image:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Third-party actions pinned to commit SHA (supply-chain hardening); the
      # release pipeline has packages:write, so a hijacked tag could poison
      # published images. Tag comments are the resolved version.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Resolve base pineforge-release version + wait for its image
        id: base
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          semver() { printf '%s' "$1" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$'; }
          # actions/checkout@v4 re-points refs/tags/<tag> at the peeled COMMIT, so
          # cat-file would see 'commit'. Re-fetch tags (forced) to restore the
          # annotated tag objects before reading the message.
          git fetch --force --tags origin >/dev/null 2>&1 || true
          rel=""
          # Trust the tag message ONLY if REF is an ANNOTATED tag — a lightweight
          # tag (or workflow_dispatch's branch ref) leaks the commit body, not ours.
          if [ "$(git cat-file -t "$REF" 2>/dev/null || true)" = tag ]; then
            rel="$(git for-each-ref --format='%(contents:body)' "refs/tags/$REF" | sed -n 's/^release=//p' | head -1)"
          fi
          if ! semver "$rel"; then
            echo "::warning::no valid release= in tag ${REF} — resolving latest pineforge-release (may differ from this commit's intended base)"
            for i in 1 2 3 4 5; do rel="$(gh release view -R pineforge-4pass/pineforge-release --json tagName -q .tagName 2>/dev/null || true)"; [ -n "$rel" ] && break; sleep 5; done
            rel="${rel#v}"
          fi
          semver "$rel" || { echo "::error::bad base release version '$rel'"; exit 1; }
          # The base image must exist before we build FROM it.
          img="ghcr.io/pineforge-4pass/pineforge-release:${rel}"
          ok=
          for i in $(seq 1 20); do
            if docker manifest inspect "$img" >/dev/null 2>&1; then ok=1; break; fi
            echo "waiting for base image ${img} ... (${i})"; sleep 15
          done
          [ -n "$ok" ] || { echo "::error::base image ${img} not available after wait"; exit 1; }
          echo "release=$rel" >> "$GITHUB_OUTPUT"
          echo "base pineforge-release=$rel"
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PINEFORGE_RELEASE_VERSION=${{ steps.base.outputs.release }}
          tags: |
            ghcr.io/pineforge-4pass/pineforge-codegen-mcp:${{ github.ref_name }}
            ghcr.io/pineforge-4pass/pineforge-codegen-mcp:latest

  # Publish metadata to the official MCP Registry (registry.modelcontextprotocol.io).
  # Runs AFTER `image` so the pushed image carries the
  # io.modelcontextprotocol.server.name LABEL the registry validates against
  # server.json `name`. GitHub OIDC authenticates the io.github.pineforge-4pass
  # namespace from this repo — no interactive login, no stored token.
  mcp-registry:
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Login (GitHub OIDC) and publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
